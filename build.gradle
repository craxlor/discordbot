/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '7.1.2'
}

mainClassName = 'com.github.craxlor.discordbot.Main'

configurations {
    umlDoclet
}

repositories{
    flatDir { dirs 'libs' }
    google()
    jcenter()
    mavenCentral()
    maven { url 'https://m2.dv8tion.net/releases' }
}

dependencies {
    implementation fileTree(dir:'resources/jars', include: ['*.jar'])
    // implementation files('D:\\Coding_projects\\java\\utilities\\build\\libs\\utilities.jar')
    // implementation files('D:\\Coding_projects\\java\\jReddit\\build\\libs\\jReddit.jar')
    implementation 'net.dv8tion:JDA:5.0.0-alpha.20'
    implementation 'com.sedmelluq:lavaplayer:1.3.78'
    implementation 'ch.qos.logback:logback-classic:1.2.3'
    implementation 'com.googlecode.json-simple:json-simple:1.1.1'
    implementation 'com.google.code.gson:gson:2.8.9'
    // support spotify tracks in music module
    implementation 'se.michaelthelin.spotify:spotify-web-api-java:7.2.2'
    implementation 'com.google.api-client:google-api-client:1.32.1'
    implementation 'com.google.oauth-client:google-oauth-client-jetty:1.23.0'
    implementation 'com.google.apis:google-api-services-youtube:v3-rev222-1.25.0'
    umlDoclet "nl.talsmasoftware:umldoclet:2.0.19"
}

shadowJar{
    archiveClassifier.set('')
}

javadoc {
    source = sourceSets.main.allJava
    options.docletpath = configurations.umlDoclet.files.asType(List)
    options.doclet = "nl.talsmasoftware.umldoclet.UMLDoclet"
    // options.addStringOption "additionalParamName", "additionalParamValue"
}